<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj's Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1612;
    --ink2: #4a3f35;
    --ink3: #8a7b6e;
    --cream: #f7f3ee;
    --cream2: #ede6dc;
    --cream3: #e0d5c7;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --red: #b84040;
    --white: #fdfaf7;
    --shadow: rgba(26,22,18,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--cream3) 39px, var(--cream3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--cream3) 39px, var(--cream3) 40px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 700;
    line-height: 0.95;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .header-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    justify-content: center;
  }

  .header-rule span {
    height: 1px;
    width: 60px;
    background: var(--ink3);
    opacity: 0.4;
  }

  .header-rule i {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink3);
  }

  /* Search card */
  .search-card {
    background: var(--white);
    border: 1px solid var(--cream3);
    border-radius: 2px;
    padding: 28px 28px 24px;
    box-shadow: 4px 4px 0 var(--cream3), 8px 8px 0 var(--cream2);
    margin-bottom: 32px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .search-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-wrap: wrap;
  }

  #wordInput {
    flex: 1;
    min-width: 160px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--cream3);
    border-radius: 2px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #wordInput::placeholder { color: var(--ink3); opacity: 0.6; }

  #wordInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 12px 20px;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  #searchBtn {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
    min-width: 100px;
  }

  #searchBtn:hover { background: var(--ink2); border-color: var(--ink2); }
  #searchBtn:active { transform: scale(0.97); }
  #searchBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

  #micBtn {
    background: transparent;
    color: var(--ink2);
    border-color: var(--cream3);
    padding: 12px 16px;
  }

  #micBtn:hover { border-color: var(--gold); color: var(--gold); }
  #micBtn.listening { border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }

  /* Result section */
  .section {
    animation: fadeUp 0.5s ease both;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--cream3);
  }

  /* Word result */
  #resultWord {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  #resultPhonetic {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 20px;
    font-style: italic;
  }

  .meaning-block {
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--white);
    border-left: 3px solid var(--gold);
    border-radius: 0 2px 2px 0;
  }

  .meaning-pos {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .meaning-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink2);
  }

  .meaning-example {
    margin-top: 8px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink3);
    padding-left: 12px;
    border-left: 1px solid var(--cream3);
  }

  /* Empty / error states */
  .empty-state {
    text-align: center;
    padding: 40px 24px;
    color: var(--ink3);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
  }

  /* History */
  .history-list { list-style: none; }

  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--cream3);
    cursor: pointer;
    transition: padding-left 0.2s;
  }

  .history-item:hover { padding-left: 6px; }
  .history-item:last-child { border-bottom: none; }

  .history-num {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    color: var(--gold);
    min-width: 20px;
    padding-top: 2px;
  }

  .history-word {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .history-def {
    font-size: 13px;
    color: var(--ink3);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--cream);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 2px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(253,250,247,0.3);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .meaning-block { animation: slideIn 0.3s ease both; }

  /* Mobile */
  @media (max-width: 480px) {
    .page { padding: 32px 16px 60px; }
    .search-card { padding: 20px 16px; box-shadow: 3px 3px 0 var(--cream3); }
    #wordInput { font-size: 18px; }
    .input-row { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
    #micBtn { width: auto; }
    .input-row { flex-direction: row; }
    #searchBtn { flex: 1; }
  }
</style>
</head>
<body>

<div class="page">

  <header class="header">
    <p class="header-eyebrow">The English</p>
    <h1>Lexi<em>con</em></h1>
    <div class="header-rule">
      <span></span>
      <i>words & their meanings</i>
      <span></span>
    </div>
  </header>

  <div class="search-card">
    <label class="search-label" for="wordInput">Look up a word</label>
    <div class="input-row">
      <input type="text" id="wordInput" placeholder="e.g. ephemeral" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn" id="searchBtn" onclick="searchWord()">Search</button>
      <button class="btn" id="micBtn" onclick="startMic()" title="Voice search">🎤</button>
    </div>
  </div>

  <div id="resultSection" style="display:none; margin-bottom: 40px;">
    <div class="section-header">
      <span class="section-title">Definition</span>
      <span class="section-line"></span>
    </div>
    <div id="resultWord"></div>
    <div id="resultPhonetic"></div>
    <div id="result"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">History</span>
      <span class="section-line"></span>
    </div>
    <ul class="history-list" id="history">
      <li class="empty-state">No words searched yet.</li>
    </ul>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const thread_id = "8683905746";

  function showToast(msg, dur = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  async function searchWord() {
    const btn = document.getElementById('searchBtn');
    const word = document.getElementById('wordInput').value.trim();
    if (!word) { showToast('Please enter a word first.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Searching…';

    try {
      const res = await fetch(`https://mihika-chatbot.onrender.com/dictionary?word=${encodeURIComponent(word)}&thread_id=${thread_id}`);
      const data = await res.json();
      displayResult(data, word);
      loadHistory();
    } catch (e) {
      showToast('Could not reach the server.');
      console.error(e);
    }

    btn.disabled = false;
    btn.innerHTML = 'Search';
  }

  function displayResult(data, word) {
    const section = document.getElementById('resultSection');
    const wordEl = document.getElementById('resultWord');
    const phoneticEl = document.getElementById('resultPhonetic');
    const resultEl = document.getElementById('result');

    section.style.display = 'block';
    wordEl.textContent = word || '';
    phoneticEl.textContent = data.phonetic || '';
    resultEl.innerHTML = '';

    if (!data.meanings || data.meanings.length === 0) {
      resultEl.innerHTML = '<div class="empty-state">No definitions found.</div>';
      return;
    }

    data.meanings.forEach((m, i) => {
      const block = document.createElement('div');
      block.className = 'meaning-block';
      block.style.animationDelay = (i * 0.06) + 's';

      let html = '';
      if (typeof m === 'object' && m.partOfSpeech) {
        html += `<div class="meaning-pos">${m.partOfSpeech}</div>`;
        html += `<div class="meaning-text">${m.definition || m.text || ''}</div>`;
        if (m.example) html += `<div class="meaning-example">"${m.example}"</div>`;
      } else {
        html += `<div class="meaning-pos">Definition ${i + 1}</div>`;
        html += `<div class="meaning-text">${m}</div>`;
      }

      block.innerHTML = html;
      resultEl.appendChild(block);
    });
  }

  async function loadHistory() {
    try {
      const res = await fetch(`https://mihika-chatbot.onrender.com/dictionary_history/${thread_id}`);
      const data = await res.json();
      const list = document.getElementById('history');
      list.innerHTML = '';

      if (!data || data.length === 0) {
        list.innerHTML = '<li class="empty-state">No words searched yet.</li>';
        return;
      }

      [...data].reverse().forEach((item, i) => {
        let word = '', meanings = [];
        try {
          const parsed = JSON.parse(item);
          word = parsed.word || '';
          meanings = parsed.meanings || [];
        } catch {
          word = item;
        }

        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `
          <span class="history-num">${String(data.length - i).padStart(2, '0')}</span>
          <div>
            <div class="history-word">${word}</div>
            <div class="history-def">${meanings.slice(0,2).join(' · ') || '—'}</div>
          </div>`;
        li.onclick = () => {
          document.getElementById('wordInput').value = word;
          searchWord();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        list.appendChild(li);
      });
    } catch(e) { console.error(e); }
  }

  function startMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('Speech not supported in this browser.'); return; }

    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.start();

    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '🔴';
    btn.disabled = true;

    rec.onresult = e => {
      document.getElementById('wordInput').value = e.results[0][0].transcript;
      searchWord();
    };
    rec.onerror = e => { showToast('Microphone error: ' + e.error); };
    rec.onend = () => {
      btn.classList.remove('listening');
      btn.textContent = '🎤';
      btn.disabled = false;
    };
  }

  document.getElementById('wordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchWord();
  });

  loadHistory();
</script>
</body>
</html>
