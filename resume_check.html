<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Matcher</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4CAF50, #2e7d32);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 650px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
}

input, button {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #388e3c;
}

button:disabled {
    background: grey;
    cursor: not-allowed;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #f5f5f5;
    border-radius: 10px;
}

.shortlisted {
    color: green;
    font-weight: bold;
}

.rejected {
    color: red;
    font-weight: bold;
}

.loading {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #4CAF50;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

@media (max-width: 600px) {
    .container {
        padding: 15px;
    }
}

</style>
</head>

<body>

<div class="container">
    <h2>AI Resume Matcher</h2>

    <label>Upload Resume</label>
    <input type="file" id="resumeFile">

    <label>Upload Job Description</label>
    <input type="file" id="jdFile">

    <button id="compareBtn" onclick="compare()">Compare</button>

    <div class="loading" id="loadingBox" style="display:none;">
        <div class="spinner"></div>
        <p id="loadingText">Processing...</p>
    </div>

    <div class="result" id="resultBox" style="display:none;">
        <p><strong>Match Score:</strong> <span id="score"></span>%</p>
        <p><strong>Status:</strong> <span id="status"></span></p>

        <h4>Interview Questions:</h4>
        <ul id="questions"></ul>
    </div>
</div>

<script>
async function compare() {

    const resumeFile = document.getElementById("resumeFile").files[0];
    const jdFile = document.getElementById("jdFile").files[0];
    const btn = document.getElementById("compareBtn");
    const loadingBox = document.getElementById("loadingBox");
    const loadingText = document.getElementById("loadingText");

    if (!resumeFile || !jdFile) {
        alert("Please upload both files.");
        return;
    }

    try {
        btn.disabled = true;
        loadingBox.style.display = "block";
        document.getElementById("resultBox").style.display = "none";

        loadingText.innerText = "Uploading Resume...";
        let formData = new FormData();
        formData.append("file", resumeFile);
        await fetch("https://mihika-chatbot.onrender.com/upload_resume", {
            method: "POST",
            body: formData
        });

        loadingText.innerText = "Uploading Job Description...";
        formData = new FormData();
        formData.append("file", jdFile);
        await fetch("https://mihika-chatbot.onrender.com/upload_jd", {
            method: "POST",
            body: formData
        });

        loadingText.innerText = "Analyzing Match...";
        const response = await fetch("https://mihika-chatbot.onrender.com/compare");

        if (!response.ok) {
            throw new Error("Server error during comparison");
        }

        const data = await response.json();

        document.getElementById("score").innerText = data.match_score;

        const statusEl = document.getElementById("status");
        statusEl.innerText = data.shortlisted ? "Shortlisted" : "Not Shortlisted";
        statusEl.className = data.shortlisted ? "shortlisted" : "rejected";

        const questionList = document.getElementById("questions");
        questionList.innerHTML = "";

        data.interview_questions.forEach(q => {
            const li = document.createElement("li");
            li.innerText = q;
            questionList.appendChild(li);
        });

        document.getElementById("resultBox").style.display = "block";

    } catch (error) {
        alert("Something went wrong: " + error.message);
    } finally {
        loadingBox.style.display = "none";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
