<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 400px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #eee;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<div class="chat-container">
    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("https://mihika-chatbot.onrender.com/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            role: "user",
            content: text
        })
    });

    const data = await res.json();
    addMessage(data.messages, "bot");
}

function addMessage(text, type) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = marked.parse(text);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

window.onload = function() {
    addMessage(
        "Hi 👋 I am Mihika, developed by Raj. I can help you in your day-to-day decisions!",
        "bot"
    );
};

</script>

</body>
</html>
