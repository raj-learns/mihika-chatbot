<!DOCTYPE html>
<html>

<head>
    <title>Mihika Chat by Raj</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: auto;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 15px;
        }

        .user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #eee;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-left: 8px;
            padding: 12px 18px;
            border-radius: 20px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                max-width: 100%;
            }

            .message {
                font-size: 14px;
                max-width: 90%;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="chat-container">
        <div id="chatBox" class="chat-box"></div>

        <div class="input-area">
            <input id="msg" placeholder="Type message..." />
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let threadId = localStorage.getItem("threadId");

        if (!threadId) {
            threadId = prompt("Enter your phone number to start chat:");
            localStorage.setItem("threadId", threadId);
        }

        async function send() {
            const input = document.getElementById("msg");
            const text = input.value;
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const res = await fetch("https://mihika-chatbot.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    role: "user",
                    content: text,
                    thread_id: threadId
                })
            });

            const data = await res.json();
            addMessage(data.messages, "bot");
        }

        function addMessage(text, type) {
            const box = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = "message " + type;
            div.innerHTML = marked.parse(text);
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        window.onload = function () {
            addMessage(
                "Hi 👋 I am Mihika, developed by Raj. I can help you in your day-to-day decisions!",
                "bot"
            );
        };

    </script>

</body>

</html>
