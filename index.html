v<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mihika Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #161820;
            --surface2: #1e2028;
            --border: #2a2d3a;
            --accent: #7c6fff;
            --accent2: #ff6b9d;
            --text: #e8eaf0;
            --text-muted: #6b7080;
            --user-bg: linear-gradient(135deg, #7c6fff, #a78bfa);
            --bot-bg: #1e2028;
            --radius: 18px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(124,111,255,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(255,107,157,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            max-height: 820px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);

            @media (max-width: 500px) {
                border-radius: 0;
                max-height: 100dvh;
                border: none;
            }
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(22, 24, 32, 0.8);
            backdrop-filter: blur(12px);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c6fff, #ff6b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(124,111,255,0.3);
        }

        .header-info { flex: 1; }
        .header-name {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.01em;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .resume-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: rgba(124,111,255,0.12);
            border: 1px solid rgba(124,111,255,0.25);
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .resume-btn:hover {
            background: rgba(124,111,255,0.22);
            border-color: rgba(124,111,255,0.5);
            transform: translateY(-1px);
        }

        /* Chat box */
        .chat-box {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Messages */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c6fff, #ff6b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }
        .message-row.user .msg-avatar { display: none; }

        .message {
            max-width: 78%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.55;
            word-break: break-word;
        }
        .message.bot {
            background: var(--bot-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background: var(--user-bg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 16px rgba(124,111,255,0.3);
        }

        /* Markdown inside bot messages */
        .message.bot p { margin: 0 0 6px; }
        .message.bot p:last-child { margin-bottom: 0; }
        .message.bot strong { color: #a78bfa; }
        .message.bot code {
            background: rgba(124,111,255,0.15);
            border: 1px solid rgba(124,111,255,0.2);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 13px;
        }
        .message.bot ul, .message.bot ol {
            padding-left: 18px;
            margin: 6px 0;
        }
        .message.bot li { margin-bottom: 4px; }

        /* Timestamp */
        .timestamp {
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 2px;
            padding: 0 4px;
        }
        .message-row.user .timestamp { text-align: right; }

        /* Typing indicator */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: slideUp 0.3s ease both;
        }
        .typing-bubble {
            background: var(--bot-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 13px 16px;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 12px 16px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap:focus-within {
            border-color: rgba(124,111,255,0.5);
            box-shadow: 0 0 0 3px rgba(124,111,255,0.08);
        }
        .input-wrap input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--text);
            min-width: 0;
        }
        .input-wrap input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #7c6fff, #a78bfa);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 12px rgba(124,111,255,0.35);
        }
        .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 18px rgba(124,111,255,0.45); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn svg { width: 18px; height: 18px; }

        @media (max-width: 500px) {
            .chat-container { border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="avatar">❤️</div>
        <div class="header-info">
            <div class="header-name">Mihika</div>
            <div class="header-status">
                <div class="status-dot"></div>
                <span>Online · by Raj</span>
            </div>
        </div>
        <button class="resume-btn" onclick="goToResumeMatcher()">Resume Matcher ↗</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <div class="input-wrap">
            <input id="msg" placeholder="Message Mihika…" autocomplete="off" />
            <button class="send-btn" onclick="send()" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    let threadId = localStorage.getItem("threadId");
    if (!threadId) {
        threadId = prompt("Enter your phone number to start chat:");
        localStorage.setItem("threadId", threadId);
    }

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, type) {
        const box = document.getElementById("chatBox");

        const row = document.createElement("div");
        row.className = `message-row ${type}`;

        if (type === "bot") {
            const av = document.createElement("div");
            av.className = "msg-avatar";
            av.textContent = "❤️";
            row.appendChild(av);
        }

        const col = document.createElement("div");
        col.style.display = "flex";
        col.style.flexDirection = "column";
        col.style.alignItems = type === "user" ? "flex-end" : "flex-start";

        const div = document.createElement("div");
        div.className = `message ${type}`;
        div.innerHTML = type === "bot" ? marked.parse(text) : escapeHtml(text);

        const ts = document.createElement("div");
        ts.className = "timestamp";
        ts.textContent = getTime();

        col.appendChild(div);
        col.appendChild(ts);
        row.appendChild(col);

        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    let typingEl = null;
    function showTyping() {
        const box = document.getElementById("chatBox");
        typingEl = document.createElement("div");
        typingEl.className = "typing-row";
        typingEl.innerHTML = `
            <div class="msg-avatar">✦</div>
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>`;
        box.appendChild(typingEl);
        box.scrollTop = box.scrollHeight;
    }
    function hideTyping() {
        if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    async function send() {
        const input = document.getElementById("msg");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";
        showTyping();

        try {
            const res = await fetch("https://mihika-chatbot.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ role: "user", content: text, thread_id: threadId })
            });
            const data = await res.json();
            hideTyping();
            addMessage(data.messages, "bot");
        } catch (e) {
            hideTyping();
            addMessage("Sorry, I couldn't reach the server. Please try again.", "bot");
        }
    }

    document.getElementById("msg").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function goToResumeMatcher() { window.location.href = "resume_check.html"; }

    window.onload = () => {
        addMessage("Hi 👋 I'm **Mihika**, developed by Raj. I can help you in your day-to-day decisions!", "bot");
    };
</script>

</body>
</html>
